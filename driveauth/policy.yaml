# DriveAuth Edge — policy thresholds (single source of truth).
#
# Every tunable uses a ${ENV_VAR:default} placeholder. Set the env var to
# override; leave unset to use the default after the colon.
# NOVA_* aliases are still honoured for Nova AI drop-in (see config.py).
#
# Point DRIVEAUTH_POLICY_FILE at another YAML to swap the whole policy pack
# without rebuilding (e.g. fleet / OEM overlays).

version: ${DRIVEAUTH_POLICY_VERSION:driveauth-1.0}

risk:
  approve: ${DRIVEAUTH_RISK_APPROVE:0.35}
  reject: ${DRIVEAUTH_RISK_REJECT:0.80}
  # Review fix #8: when true, a corrupt/unloadable risk_gbt.onnx raises
  # instead of silently degrading to the additive fallback -- so a bad
  # checkpoint or ORT mismatch surfaces immediately rather than after an
  # ambiguous week of drifted decisions in the field. A missing ONNX file
  # (fresh install) still falls through to additive; only present-but-broken
  # files trip the strict check.
  strict_load: ${DRIVEAUTH_RISK_STRICT_LOAD:1}

trust:
  # Phase 2b calibration (2026-07-13): lowered slightly toward genuine score
  # distributions (see phases/phase2b_calibration.json). Full percentile
  # suggestions also in phases/phase2b_suggested.env — review before fleet ship.
  accept_micro: ${DRIVEAUTH_TRUST_ACCEPT_MICRO:0.70}
  accept_standard: ${DRIVEAUTH_TRUST_ACCEPT_STD:0.78}
  accept_high: ${DRIVEAUTH_TRUST_ACCEPT_HIGH:0.85}
  reject: ${DRIVEAUTH_TRUST_REJECT:0.48}
  weights:
    voice: ${DRIVEAUTH_TRUST_W_VOICE:0.30}
    face: ${DRIVEAUTH_TRUST_W_FACE:0.40}
    finger: ${DRIVEAUTH_TRUST_W_FINGER:0.30}

# Biometric ladder: high modality score → ACCEPT; else escalate; final miss → REJECT.
# Per-modality bars from phases/phase2b_calibration.json (2026-07-15):
#   voice 0.72 — lowest thr with FAR=0 on enroll/genuine vs attack (0.70 leaked 1/12 replay)
#   face  0.70 — keep strict; genuine/attack fully overlap (EER≈0.40); no safe lower bar
#   finger 0.70 — last-resort match OK (mock until FingerNet + HW); same bar as face
ladder:
  accept: ${DRIVEAUTH_LADDER_ACCEPT:0.70}
  accept_voice: ${DRIVEAUTH_LADDER_ACCEPT_VOICE:0.72}
  accept_face: ${DRIVEAUTH_LADDER_ACCEPT_FACE:0.70}
  accept_finger: ${DRIVEAUTH_LADDER_ACCEPT_FINGER:0.70}
  # Opt-in defense-in-depth for PAD's measured off-angle weakness.
  # When >0: face early-stop ACCEPT is withheld if face score AND PAD bonafide
  # proba both sit within this margin above their bars → escalate to stage-3.
  # Default 0 = unchanged ladder behavior. Typical enable value: 0.05.
  face_borderline_margin: ${DRIVEAUTH_FACE_BORDERLINE_MARGIN:0}
  # Stage-3 lane: finger_only (default) | otp_only | finger_or_otp
  stage3_mode: ${DRIVEAUTH_LADDER_STAGE3_MODE:finger_only}
  # Probe order when stage3_mode is finger_or_otp (comma-separated).
  stage3_order: ${DRIVEAUTH_LADDER_STAGE3_ORDER:finger,otp}

confidence:
  floor: ${DRIVEAUTH_CONF_FLOOR:0.55}
  # ConfidenceScorer internals (fusion.py)
  disagreement_spread: ${DRIVEAUTH_CONF_DISAGREE_SPREAD:0.35}
  single_modality_agreement: ${DRIVEAUTH_CONF_SINGLE_AGREE:0.60}
  low_quality_bar: ${DRIVEAUTH_CONF_LOW_QUALITY:0.50}
  ood_missing_penalty: ${DRIVEAUTH_CONF_OOD_MISSING:0.85}
  behavioral_missing_penalty: ${DRIVEAUTH_CONF_BEHAVIOR_MISSING:0.55}
  sensor_gap_penalty: ${DRIVEAUTH_CONF_SENSOR_GAP:0.70}
  hardware_fault_penalty: ${DRIVEAUTH_CONF_HW_FAULT:0.25}
  w_agreement: ${DRIVEAUTH_CONF_W_AGREE:0.45}
  w_quality: ${DRIVEAUTH_CONF_W_QUALITY:0.35}
  w_ood: ${DRIVEAUTH_CONF_W_OOD:0.20}

tiers:
  micro_max: ${DRIVEAUTH_TIER_MICRO_MAX:200.0}
  high_min: ${DRIVEAUTH_TIER_HIGH_MIN:50000.0}
  guest_max: ${DRIVEAUTH_TIER_GUEST_MAX:1000.0}

fraud:
  decay_hours: ${DRIVEAUTH_FRAUD_LADDER_DECAY_HOURS:24.0}
  clean_streak: ${DRIVEAUTH_FRAUD_CLEAN_STREAK:5}
  rigor:
    bootstrap:
      min_modalities: 2
      force_step_up: true
      block: false
      trust_margin: 0.05
    normal:
      min_modalities: 1
      force_step_up: false
      block: false
      trust_margin: 0.00
    elevated:
      min_modalities: 2
      force_step_up: false
      block: false
      trust_margin: 0.05
    heightened:
      min_modalities: 3
      force_step_up: true
      block: false
      trust_margin: 0.10
    locked:
      min_modalities: 3
      force_step_up: true
      block: true
      trust_margin: 0.15

otp:
  ttl_s: ${DRIVEAUTH_OTP_TTL_S:120.0}
  length: ${DRIVEAUTH_OTP_LENGTH:6}
  max_tries: ${DRIVEAUTH_OTP_MAX_TRIES:3}
  provider_url: ${DRIVEAUTH_OTP_PROVIDER_URL:}
  provider_timeout_s: ${DRIVEAUTH_OTP_PROVIDER_TIMEOUT_S:6.0}

step_up:
  retries: ${DRIVEAUTH_STEP_UP_RETRIES:2}
  pin_min_len: ${DRIVEAUTH_PIN_MIN_LEN:4}
  fallback_min_trust: ${DRIVEAUTH_FALLBACK_MIN_TRUST:0.80}

hardware:
  fingerprint_available: ${DRIVEAUTH_FINGERPRINT_AVAILABLE:1}
  ir_camera_index: ${DRIVEAUTH_IR_CAMERA_INDEX:0}
  rgb_camera_index: ${DRIVEAUTH_RGB_CAMERA_INDEX:1}
  finger_socket: ${DRIVEAUTH_FINGER_SOCKET:/tmp/driveauth_finger.sock}
  # UART device for hardware.finger_daemon (optional extras).
  finger_uart: ${DRIVEAUTH_FINGER_UART:/dev/ttyUSB0}
  # Face matcher backend: onnx (default) | hailo
  face_backend: ${DRIVEAUTH_FACE_BACKEND:onnx}
  hailo_hef: ${DRIVEAUTH_HAILO_HEF:}
  # IR liveness gate (independent of Stage-2 PAD logreg).
  ir_liveness_enabled: ${DRIVEAUTH_IR_LIVENESS_ENABLED:0}
  ir_liveness_threshold: ${DRIVEAUTH_IR_LIVENESS_THRESHOLD:0.55}
  # Liveness v2: reflectance + blink + moiré ensemble (off = Phase-3 reflectance only).
  ir_liveness_ensemble: ${DRIVEAUTH_IR_LIVENESS_ENSEMBLE:0}
  # GPIO relay BCM pin for ACCEPT actuation (optional).
  relay_gpio_pin: ${DRIVEAUTH_RELAY_GPIO_PIN:17}

escalation:
  # Voice → Face → Finger ladder (Accept on high score; Reject if ladder exhausted).
  enabled: ${DRIVEAUTH_ESCALATION_ENABLED:1}
  constant_time_ms: ${DRIVEAUTH_ESCALATION_CONSTANT_TIME_MS:0.0}

bootstrap:
  min_txns: ${DRIVEAUTH_BOOTSTRAP_MIN_TXNS:10}
  min_days: ${DRIVEAUTH_BOOTSTRAP_MIN_DAYS:3.0}
  stale_days: ${DRIVEAUTH_PROFILE_STALE_DAYS:90.0}
  amount_cap: ${DRIVEAUTH_BOOTSTRAP_AMOUNT_CAP:2000.0}
  # Bumped 2 -> 3 in this release for home-learning fields (review fix #3).
  # v3 records also carry home_lat/home_lon/home_n/home_last_update_at;
  # v2 records forward-migrate automatically via profile_store._migrate.
  schema_version: ${DRIVEAUTH_PROFILE_SCHEMA_VERSION:3}

cache:
  decision_ttl_s: ${DRIVEAUTH_DECISION_CACHE_TTL_S:8.0}

quality:
  voice_min_snr_db: ${DRIVEAUTH_Q_VOICE_MIN_SNR:6.0}
  voice_clip_frac: ${DRIVEAUTH_Q_VOICE_CLIP_FRAC:0.02}
  voice_min_seconds: ${DRIVEAUTH_Q_VOICE_MIN_SEC:1.0}
  face_min_sharpness: ${DRIVEAUTH_Q_FACE_MIN_SHARP:40.0}
  face_min_bright: ${DRIVEAUTH_Q_FACE_MIN_BRIGHT:25.0}
  face_max_bright: ${DRIVEAUTH_Q_FACE_MAX_BRIGHT:235.0}
  face_min_frac: ${DRIVEAUTH_FACE_MIN_FRAC:0.18}
  finger_min_contact: ${DRIVEAUTH_Q_FINGER_MIN_CONTACT:0.35}

ood:
  z_thresh: ${DRIVEAUTH_OOD_Z_THRESH:3.0}
  cosine_thresh: ${DRIVEAUTH_OOD_COSINE_THRESH:0.55}

orchestrator:
  uncertainty_thresh: ${DRIVEAUTH_ORCH_UNCERTAINTY:0.35}

# Geo / home-learning (review fix #3). The runtime learns home lat/lon online
# from ACCEPT-decision GPS fixes so the risk model's dist_from_home and
# out_of_zone features actually have live values in production instead of
# staying at their RiskContext dataclass defaults.
geo:
  # in_trusted_zone := distance from learned home <= this many km.
  trusted_zone_radius_km: ${DRIVEAUTH_TRUSTED_ZONE_RADIUS_KM:5.0}
  # Home is treated as "not yet learned" (fail-neutral) until we've seen at
  # least this many accepted-auth GPS fixes.
  home_learn_min_samples: ${DRIVEAUTH_HOME_LEARN_MIN_SAMPLES:3}
  # Drop GPS fixes worse than this from the home-learning Welford update.
  home_learn_max_accuracy_m: ${DRIVEAUTH_HOME_LEARN_MAX_ACCURACY_M:100.0}
