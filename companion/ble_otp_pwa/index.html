<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f1419" />
  <title>DriveAuth OTP</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    :root {
      --bg0: #0f1419;
      --bg1: #1a222c;
      --ink: #e8eef4;
      --muted: #8b9aab;
      --accent: #3d9b7a;
      --warn: #c47a3a;
      --err: #c45c5c;
      --mono: "IBM Plex Mono", "SF Mono", ui-monospace, monospace;
      --sans: "Source Sans 3", "Segoe UI", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--sans);
      color: var(--ink);
      background:
        radial-gradient(ellipse 80% 50% at 20% 0%, #1c2a24 0%, transparent 55%),
        radial-gradient(ellipse 60% 40% at 100% 100%, #1a2430 0%, transparent 50%),
        var(--bg0);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.25rem 3rem;
    }
    h1 {
      font-size: clamp(1.6rem, 5vw, 2.1rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 0.35rem;
    }
    .sub {
      color: var(--muted);
      max-width: 28rem;
      text-align: center;
      line-height: 1.45;
      margin-bottom: 2rem;
    }
    .code {
      font-family: var(--mono);
      font-size: clamp(2.4rem, 10vw, 3.5rem);
      letter-spacing: 0.28em;
      padding: 1.25rem 1.5rem;
      min-width: min(100%, 18rem);
      text-align: center;
      background: var(--bg1);
      border: 1px solid #2a3542;
      border-radius: 4px;
      margin-bottom: 1rem;
    }
    .status {
      font-size: 0.95rem;
      color: var(--muted);
      min-height: 1.4em;
      margin-bottom: 1.5rem;
    }
    .status.ok { color: var(--accent); }
    .status.err { color: var(--err); }
    .status.warn { color: var(--warn); }
    button {
      font: inherit;
      font-weight: 600;
      padding: 0.85rem 1.4rem;
      border: 0;
      border-radius: 4px;
      background: var(--accent);
      color: #04140e;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    button.secondary {
      background: transparent;
      color: var(--ink);
      border: 1px solid #3a4654;
      margin-left: 0.5rem;
    }
    .actions { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; }
    .hint {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: var(--muted);
      max-width: 26rem;
      text-align: center;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>DriveAuth</h1>
  <p class="sub">Companion OTP for in-vehicle ladder step-up. Connect to the car’s BLE peripheral, then wait for a code.</p>
  <div class="code" id="otp" aria-live="polite">————</div>
  <p class="status" id="status">Ready</p>
  <div class="actions">
    <button type="button" id="connect">Connect to car</button>
    <button type="button" id="disconnect" class="secondary" disabled>Disconnect</button>
  </div>
  <p class="hint">
    Chrome / Android recommended (Web Bluetooth). Serve this folder over HTTPS or
    <code>localhost</code>. Service UUID
    <code>6e400001-b5a3-f393-e0a9-e50e24dcca9e</code>.
  </p>
  <script src="app.js"></script>
</body>
</html>
