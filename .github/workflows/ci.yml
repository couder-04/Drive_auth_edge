name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install "ruff>=0.15"
      - name: Ruff check
        run: ruff check driveauth hardware dashboard demo tests scripts

  test:
    name: pytest + coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,dashboard,onnx]"
          pip install "httpx>=0.27" "pytest-cov>=5.0"
      - name: Pytest with coverage
        env:
          DRIVEAUTH_USE_MOCK: "1"
          DRIVEAUTH_DASHBOARD_API_KEY: "ci-dashboard-key"
        run: |
          python -m pytest -q --tb=short \
            --cov=driveauth --cov=dashboard --cov=hardware \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=55 \
            | tee pytest-output.txt
      - name: Failure summary
        if: failure()
        run: |
          echo "## Pytest failure summary" >> "$GITHUB_STEP_SUMMARY"
          tail -n 80 pytest-output.txt >> "$GITHUB_STEP_SUMMARY" || true
      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: pytest-output.txt
          if-no-files-found: ignore

  hardware-mock-strict:
    name: hardware-mockable (warnings as errors)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,dashboard]"
          pip install "httpx>=0.27"
      - name: Strict subset
        env:
          PYTHONWARNINGS: error
          DRIVEAUTH_USE_MOCK: "1"
          DRIVEAUTH_DASHBOARD_API_KEY: "ci-dashboard-key"
        run: |
          python -m pytest -q --tb=short \
            tests/test_hardening.py \
            tests/test_secrets.py \
            tests/test_key_protection.py \
            tests/test_core.py \
            tests/test_api.py \
            tests/test_production.py \
            tests/test_phases_2_to_6.py \
            tests/test_phase1_ladder_otp.py \
            tests/test_ble_gatt_server.py \
            tests/test_can_logger.py \
            tests/test_ir_liveness_v2.py \
            tests/test_dashboard_auth.py
