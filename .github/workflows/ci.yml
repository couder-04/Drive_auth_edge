name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,dashboard]"
          # httpx required by Starlette TestClient
          pip install "httpx>=0.27"
      - name: Full pytest suite
        run: python -m pytest -q --tb=short

  hardware-mock-strict:
    name: hardware-mockable (warnings as errors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,dashboard]"
          pip install "httpx>=0.27"
      - name: Strict subset
        env:
          PYTHONWARNINGS: error
        run: |
          python -m pytest -q --tb=short \
            tests/test_hardening.py \
            tests/test_secrets.py \
            tests/test_key_protection.py \
            tests/test_core.py \
            tests/test_api.py \
            tests/test_production.py \
            tests/test_phases_2_to_6.py \
            tests/test_phase1_ladder_otp.py \
            tests/test_ble_gatt_server.py \
            tests/test_can_logger.py \
            tests/test_ir_liveness_v2.py

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install "ruff>=0.15"
      - name: Ruff check
        run: ruff check driveauth hardware dashboard demo tests scripts
      # mypy is optional until a py.typed / stub set exists; keep the job green
      # with a no-op note when mypy is not configured.
      - name: Type-check note
        run: |
          echo "mypy not configured in pyproject yet; ruff is the lint gate."
          echo "Add [tool.mypy] when ready — do not claim typed-strict without it."
